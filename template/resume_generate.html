<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Resume | CareerForge AI</title>

    <!-- SAME fonts as preview -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/resume_preview.css">

  
    <link rel="stylesheet" href="/static/resume_pdf.css">
    

    <style>
        @page {
            size: A4;
            margin: 10mm;
        }
    </style>
</head>
<body>

    <div class="page-wrapper {% if pdf_mode %}pdf-mode{% endif %}">

        {% if not pdf_mode %}
        <header class="topbar">
            <div class="logo"><span>Career</span>Forge AI</div>
            <div class="topbar-actions">
                <a href="/choose_template" class="back-link">← Back to Templates</a>
            </div>
        </header>

        <section class="preview-header">
            <div class="preview-header-left">
                <p class="preview-badge">Selected Template</p>
                <h1>Your Resume is Ready</h1>
                <p class="preview-subtext">
                    Your template is selected successfully. Now download your resume as PDF.
                </p>
            </div>

            <div class="preview-header-right">
                <div class="selected-template-box">
                    <span class="selected-label">Selected Template</span>
                    <strong>{{ selected_template_name }}</strong>
                </div>
            </div>
        </section>

        <section class="preview-actions-bar">
            <button type="button" class="secondary-btn" onclick="window.location.href='/choose_template'">
                Change Template
            </button>

            <button type="button" class="primary-btn" onclick="window.location.href='/generate_pdf'">
                Download PDF
            </button>
        </section>
        {% endif %}

        <main class="preview-main">
            <div class="resume-shell">
                <div class="resume-paper template-{{ selected_template_name }}">
                    {% include template_file %}
                </div>
            </div>
        </main>

    </div>

</body>
</html>
