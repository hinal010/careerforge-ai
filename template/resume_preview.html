<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Preview | CareerForge AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/resume_preview.css">
    <link rel="stylesheet" href="/static/resume_pdf.css">
</head>
<body>

    <div class="page-wrapper">

        <header class="topbar">
            <div class="logo"><span>Career</span>Forge AI</div>

            <div class="topbar-actions">
                <a href="/choose_template" class="back-link">← Back to Templates</a>
            </div>
        </header>

        <section class="preview-header">
            <div class="preview-header-left">
                <p class="preview-badge">Resume Preview</p>
                <h1>Your Resume Template Preview</h1>
                <p class="preview-subtext">
                    Review how your resume looks in the selected template before finalizing it.
                </p>
            </div>

            <div class="preview-header-right">
                <div class="selected-template-box">
                    <span class="selected-label">Selected Template</span>
                    <strong id="selectedTemplateName">
                        {{ selected_template_name if selected_template_name else "classic-edge" }}
                    </strong>
                </div>
            </div>
        </section>

        <section class="preview-actions-bar">
            <button type="button" class="secondary-btn" onclick="window.location.href='/choose_template'">
                Change Template
            </button>
            <button type="button" class="primary-btn" onclick="useTemplate()">
                Use This Template
            </button>
        </section>

        <main class="preview-main">
            <div class="resume-shell">
                <div class="resume-paper template-{{ selected_template_name if selected_template_name else 'classic-edge' }}" id="resumePaper">
                    {% include template_file %}
                </div>
            </div>
        </main>

    </div>

    <script>
        const templateId = "{{ selected_template_name if selected_template_name else 'classic-edge' }}";

        function useTemplate() {
            window.location.href = `/use_template?template=${templateId}`;
        }
    </script>

</body>
</html>
