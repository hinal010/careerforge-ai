<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | CareerForge AI</title>

  <!-- SAME FONT SYSTEM -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/register.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo"><span>Career</span>Forge AI</div>
  </nav>

  <!-- REGISTER -->
  <main class="register-wrapper">
    <div class="register-card">

      <h1 class="register-title">Create your account</h1>

      <!-- FORM -->
      <form action="/register" method="post" class="register-form">

        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter username" required>
        </div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="full_name" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="Enter email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="register-btn">Register</button>

      </form>

      <p class="login-text">
        Already have an account?
        <a href="/login">Login</a>
      </p>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-left">
      © 2026 CareerForge AI. All rights reserved.
    </div>
    <div class="footer-right">
      <a href="#">Terms</a>
      <a href="#">Privacy</a>
      <a href="#">Contact</a>
    </div>
  </footer>

</body>
</html>
